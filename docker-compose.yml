version: '3.8'
services:
  financial-chatbot:
    build: .
    container_name: financial-chatbot
    env_file:
      - .env
    environment:
      - LLM_MODEL=${LLM_MODEL:-doubao-pro}  # 如果LLM_MODEL未设置，则默认为doubao-pro
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-60}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_URL=${LLM_API_URL}
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL}
      - API_VER=${API_VER}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: unless-stopped